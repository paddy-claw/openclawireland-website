<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="50%" style="stop-color:#0d1f1c"/>
      <stop offset="100%" style="stop-color:#0a0a0f"/>
    </linearGradient>
    
    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Subtle decorative circles -->
  <circle cx="200" cy="500" r="150" fill="#14b8a6" opacity="0.03"/>
  <circle cx="1000" cy="150" r="120" fill="#8b5cf6" opacity="0.03"/>
  
  <!-- Main content group centered -->
  <g transform="translate(600, 315)">
    <!-- Lobster emoji -->
    <text x="0" y="-120" font-size="140" text-anchor="middle" filter="url(#glow)">🦞</text>
    
    <!-- Title -->
    <text x="0" y="50" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="72" font-weight="bold" text-anchor="middle" fill="#ffffff">OpenClaw <tspan fill="#14b8a6">Ireland</tspan></text>
    
    <!-- Tagline -->
    <text x="0" y="120" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="28" text-anchor="middle" fill="#94a3b8">The lobster has landed. Building Ireland's AI agent community.</text>
  </g>
  
  <!-- URL at bottom left -->
  <text x="60" y="580" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="20" font-weight="600" fill="#14b8a6" letter-spacing="1">openclaw.ie</text>
  
  <!-- Small claw mark at bottom right -->
  <text x="1100" y="580" font-size="50" opacity="0.4" transform="rotate(-15 1100 580)">🦞</text>
</svg>