<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OG Image — OpenClaw Ireland</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 1200px;
            height: 630px;
            background: linear-gradient(135deg, #0a0a0f 0%, #0d1f1c 50%, #0a0a0f 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            position: relative;
            overflow: hidden;
        }
        
        /* Background pattern */
        .bg-pattern {
            position: absolute;
            inset: 0;
            opacity: 0.03;
            background-image: 
                radial-gradient(circle at 20% 80%, #14b8a6 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, #8b5cf6 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, #14b8a6 0%, transparent 30%);
        }
        
        .container {
            text-align: center;
            z-index: 1;
            padding: 60px;
        }
        
        .logo {
            font-size: 120px;
            margin-bottom: 30px;
            filter: drop-shadow(0 4px 20px rgba(20, 184, 166, 0.3));
        }
        
        h1 {
            font-size: 72px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 20px;
            letter-spacing: -2px;
        }
        
        h1 span {
            color: #14b8a6;
        }
        
        .tagline {
            font-size: 32px;
            color: #94a3b8;
            font-weight: 400;
            max-width: 800px;
            line-height: 1.4;
        }
        
        .claw-mark {
            position: absolute;
            bottom: 40px;
            right: 60px;
            font-size: 60px;
            opacity: 0.5;
            transform: rotate(-15deg);
        }
        
        .url {
            position: absolute;
            bottom: 40px;
            left: 60px;
            font-size: 20px;
            color: #14b8a6;
            font-weight: 600;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    <div class="container">
        <div class="logo">🦞</div>
        <h1>OpenClaw <span>Ireland</span></h1>
        <p class="tagline">The lobster has landed. Building Ireland's AI agent community.</p>
    </div>
    <div class="url">openclaw.ie</div>
    <div class="claw-mark">🦞</div>
</body>
</html>
